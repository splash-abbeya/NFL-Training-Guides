<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splash Training Test</title>
<style>
:root{
  --navy:#0b2540; --navy2:#123a5e; --teal:#14b8a6; --teal2:#2dd4bf;
  --ink:#14213d; --sub:#516079; --bg:#f1f5f9; --card:#ffffff; --ring:#e2e8f0;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#0d6d63 100%);color:#fff;padding:56px 24px 70px;text-align:center;position:relative}
.hero h1{font-size:34px;margin:14px 0 8px;font-weight:800}
.hero .sub{opacity:.9;max-width:620px;margin:0 auto;font-size:16px}
.eyebrow{display:inline-block;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:999px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
.wrap{max-width:720px;margin:32px auto 60px;padding:0 20px}
.card{background:var(--card);border-radius:16px;box-shadow:0 12px 34px rgba(15,41,66,.14);padding:32px}
h2{margin-top:0;font-size:22px;color:var(--navy)}
label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.03em}
input[type=text],input[type=email]{width:100%;padding:12px 14px;border:1.5px solid var(--ring);border-radius:10px;font-size:15px;font-family:inherit}
input:focus{outline:none;border-color:var(--teal)}
.btn{display:inline-block;background:var(--teal);color:#fff;border:none;padding:13px 26px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:22px}
.btn:hover{background:#0d9488}
.btn:disabled{background:#cbd5e1;cursor:not-allowed}
.btn.secondary{background:#fff;color:var(--navy);border:1.5px solid var(--ring)}
.btn.secondary:hover{background:#f8fafc}
.btn-row{display:flex;gap:12px;justify-content:space-between;align-items:center;margin-top:26px}

.progress-wrap{margin-bottom:22px}
.progress-bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));transition:width .25s}
.progress-label{font-size:12.5px;color:var(--sub);margin-top:8px;display:flex;justify-content:space-between}

.guide-chip{display:inline-block;font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;padding:4px 12px;border-radius:999px;margin-bottom:14px}

.qtext{font-size:18px;font-weight:700;margin:0 0 20px;color:var(--ink)}
.opt{display:block;width:100%;text-align:left;border:1.5px solid var(--ring);background:#fff;padding:13px 16px;border-radius:10px;font-size:15px;cursor:pointer;margin-bottom:10px;transition:.12s}
.opt:hover{border-color:var(--teal)}
.opt.selected{border-color:var(--teal);background:#f0fdfa;font-weight:600}

.score-hero{text-align:center;padding:10px 0 20px}
.score-num{font-size:56px;font-weight:800;color:var(--navy)}
.score-sub{color:var(--sub);font-size:15px}

table.results{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
table.results th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--ring);font-size:12px;text-transform:uppercase;color:var(--sub)}
table.results td{padding:9px 10px;border-bottom:1px solid var(--ring)}
.pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12.5px;font-weight:700;color:#fff}

.miss-item{border-left:4px solid #dc2626;background:#fef2f2;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:14px}
.miss-item .qq{font-weight:700;margin-bottom:4px}
.miss-item .ans{color:#166534;font-weight:600}

.locked-box{text-align:center;padding:20px 0}
.locked-box .big{font-size:40px}

.footnote{font-size:12.5px;color:var(--sub);text-align:center;margin-top:18px}
</style>
</head>

    <div class="card">
      <h2>Before you begin</h2>
      <p style="color:var(--sub)">This is a ${QUESTIONS.length}-question test covering NFL Squares, NFL Pick'em, CFB Pick'em, NFL Survivor, and NCAAF Survivor. Access is limited to approved CS team emails. You can retake it as many times as you need to get everything right &mdash; your results are sent to your training lead after every attempt.</p>
      <label>Your name</label>
      <input type="text" id="in-name" placeholder="Jane Doe" value="${taker.name || ""}">
      <label>Your email</label>
      <input type="email" id="in-email" placeholder="jane@splashsports.com" value="${taker.email || ""}">
      <button class="btn" id="start-btn">Begin Test</button>
    </div>
  `;
  $("#start-btn").onclick = () => {
    const name = $("#in-name").value.trim();
    const email = $("#in-email").value.trim();
    if(!name || !email){ alert("Please enter your name and email before starting."); return; }
    const normalized = email.toLowerCase();
    const isAllowed = ALLOWED_EMAILS.some(e => e.toLowerCase() === normalized);
    if(!isAllowed){ renderDenied(email); return; }
    taker = { name, email };
    current = 0;
    renderQuestion();
  };
}

function renderQuestion(){
  const q = QUESTIONS[current];
  const pct = Math.round(((current) / QUESTIONS.length) * 100);
  const color = GUIDE_COLORS[q.guide] || "#0d9488";
  const selected = answers[current];
  $("#app").innerHTML = `
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label"><span>Question ${current+1} of ${QUESTIONS.length}</span><span>${pct}% complete</span></div>
      </div>
      <span class="guide-chip" style="background:${color}">${q.guide} &middot; ${q.section_title}</span>
      <p class="qtext">${q.question}</p>
      <div id="opts"></div>
      <div class="btn-row">
        <button class="btn secondary" id="back-btn" ${current === 0 ? "disabled" : ""}>&larr; Back</button>
        <button class="btn" id="next-btn" ${selected === null ? "disabled" : ""}>${current === QUESTIONS.length - 1 ? "Submit Test" : "Next \u2192"}</button>
      </div>
    </div>
  `;
  const optsWrap = $("#opts");
  q.options.forEach((opt, i) => {
    const div = document.createElement("button");
    div.type = "button";
    div.className = "opt" + (selected === i ? " selected" : "");
    div.textContent = opt.text;
    div.onclick = () => {
      answers[current] = i;
      renderQuestion();
    };
    optsWrap.appendChild(div);
  });
  $("#back-btn").onclick = () => { if(current > 0){ current--; renderQuestion(); } };
  $("#next-btn").onclick = () => {
    if(answers[current] === null) return;
    if(current === QUESTIONS.length - 1){ finishTest(); }
    else { current++; renderQuestion(); }
  };
}

async function finishTest(){
  let correctCount = 0;
  const byGuide = {};
  const misses = [];
  const details = [];
  QUESTIONS.forEach((q, i) => {
    const chosen = answers[i];
    const correctIdx = q.options.findIndex(o => o.correct);
    const isCorrect = chosen === correctIdx;
    const chosenText = chosen !== null ? q.options[chosen].text : "(no answer)";
    const correctText = q.options[correctIdx].text;
    if(!byGuide[q.guide]) byGuide[q.guide] = { correct: 0, total: 0 };
    byGuide[q.guide].total++;
    if(isCorrect){ correctCount++; byGuide[q.guide].correct++; }
    else { misses.push({ guide: q.guide, section: q.section_title, question: q.question, correctAnswer: correctText, chosenAnswer: chosenText }); }
    details.push({ n: i + 1, guide: q.guide, section: q.section_title, question: q.question, chosenAnswer: chosenText, correctAnswer: correctText, isCorrect });
  });
  const score = Math.round((correctCount / QUESTIONS.length) * 100);
  const date = new Date().toLocaleDateString();

  const result = { name: taker.name, email: taker.email, score, correctCount, total: QUESTIONS.length, date, byGuide, misses, details };
  const isPassing = score >= PASS_THRESHOLD;

  let autoSent = false;
  if(isPassing && FORMSPREE_ENDPOINT){
    try{
      const resp = await fetch(FORMSPREE_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({
          name: result.name, email: result.email, score: `${result.score}%`,
          date: result.date, summary: buildPlainSummary(result),
        }),
      });
      autoSent = resp.ok;
    } catch(e){ autoSent = false; }
  }

  renderResults(result, autoSent);
}

function buildPlainSummary(result){
  const lines = [];
  lines.push(`Training Test Results`);
  lines.push(`Name: ${result.name}`);
  lines.push(`Email: ${result.email}`);
  lines.push(`Date: ${result.date}`);
  lines.push(`Overall score: ${result.correctCount}/${result.total} (${result.score}%)`);
  lines.push(``);
  lines.push(`Breakdown by guide:`);
  GUIDE_ORDER.forEach(g => {
    const b = result.byGuide[g];
    if(b) lines.push(`- ${g}: ${b.correct}/${b.total}`);
  });
  lines.push(``);
  lines.push(`Full results, question by question:`);
  result.details.forEach(d => {
    const mark = d.isCorrect ? "CORRECT" : "INCORRECT";
    lines.push(`${d.n}. [${mark}] [${d.guide} / ${d.section}] ${d.question}`);
    lines.push(`    Their answer: ${d.chosenAnswer}`);
    if(!d.isCorrect) lines.push(`    Correct answer: ${d.correctAnswer}`);
  });
  return lines.join("\n");
}

function buildCompactSummary(result){
  const lines = [];
  lines.push(`Training Test Results`);
  lines.push(`Name: ${result.name}`);
  lines.push(`Email: ${result.email}`);
  lines.push(`Date: ${result.date}`);
  lines.push(`Overall score: ${result.correctCount}/${result.total} (${result.score}%)`);
  lines.push(``);
  lines.push(`Breakdown by guide:`);
  GUIDE_ORDER.forEach(g => {
    const b = result.byGuide[g];
    if(b) lines.push(`- ${g}: ${b.correct}/${b.total}`);
  });
  lines.push(``);
  if(result.misses.length){
    lines.push(`Missed questions (${result.misses.length} of ${result.total}):`);
    result.misses.forEach(m => {
      lines.push(`- [${m.guide} / ${m.section}] ${m.question}`);
      lines.push(`    Their answer: ${m.chosenAnswer}`);
      lines.push(`    Correct answer: ${m.correctAnswer}`);
    });
  } else {
    lines.push(`Perfect score \u2014 no missed questions.`);
  }
  lines.push(``);
  lines.push(`(Full question-by-question results were too long to fit in this email link \u2014 use the "Copy Full Results" button on the results screen to paste the complete breakdown somewhere.)`);
  return lines.join("\n");
}

function buildMinimalSummary(result){
  const lines = [];
  lines.push(`Training Test Results`);
  lines.push(`Name: ${result.name}`);
  lines.push(`Email: ${result.email}`);
  lines.push(`Date: ${result.date}`);
  lines.push(`Overall score: ${result.correctCount}/${result.total} (${result.score}%)`);
  lines.push(``);
  lines.push(`Breakdown by guide:`);
  GUIDE_ORDER.forEach(g => {
    const b = result.byGuide[g];
    if(b) lines.push(`- ${g}: ${b.correct}/${b.total}`);
  });
  lines.push(``);
  lines.push(`(The detailed question-by-question breakdown was too long to fit in an email link. Use the "Copy Full Results" button on the results screen and paste the complete breakdown into the email or a doc.)`);
  return lines.join("\n");
}

function buildMailto(result){
  const subject = encodeURIComponent(`Training Test Results \u2014 ${result.name} (${result.correctCount}/${result.total})`);
  // Most mail clients/browsers choke somewhere around 1800-2000 chars in a mailto URL.
  // Try the full breakdown first, then a misses-only version, then a guide-only summary.
  const candidates = [buildPlainSummary(result), buildCompactSummary(result), buildMinimalSummary(result)];
  let body = encodeURIComponent(candidates[candidates.length - 1]);
  for(const candidate of candidates){
    const encoded = encodeURIComponent(candidate);
    if(encoded.length <= 1500){ body = encoded; break; }
  }
  return `mailto:${TARGET_EMAIL}?subject=${subject}&body=${body}`;
}

function renderResults(result, autoSent){
  const guideRows = GUIDE_ORDER.map(g => {
    const b = result.byGuide[g];
    if(!b) return "";
    const pct = Math.round((b.correct / b.total) * 100);
    return `<tr><td><span class="pill" style="background:${GUIDE_COLORS[g]}">${g}</span></td><td>${b.correct} / ${b.total}</td><td>${pct}%</td></tr>`;
  }).join("");

  const isPassing = result.score >= PASS_THRESHOLD;

  if(!isPassing){
    // No answers, no missed-question list -- just the score and a nudge to retake.
    $("#app").innerHTML = `
      <div class="card">
        <div class="score-hero">
          <div class="score-num">${result.correctCount} / ${result.total}</div>
          <div class="score-sub">${result.score}% &middot; ${result.name}</div>
        </div>
        <table class="results">
          <tr><th>Guide</th><th>Score</th><th>%</th></tr>
          ${guideRows}
        </table>
        <p style="text-align:center;color:var(--sub);margin-top:20px;">You need a perfect score (100%) to pass. Review the guides and give it another shot &mdash; you can retake as many times as you need.</p>
        <div style="text-align:center;">
          <button class="btn" id="retake-btn" style="margin-top:10px;">Retake Test</button>
        </div>
        <p class="footnote">Results are only sent to your training lead once you get a perfect score.</p>
      </div>
    `;
    $("#retake-btn").onclick = () => {
      answers = new Array(QUESTIONS.length).fill(null);
      current = 0;
      renderStart();
    };
    return;
  }

  // Passing score: show the send step.
  const sendBlock = autoSent
    ? `<p style="text-align:center;color:#16a34a;font-weight:700;">\u2713 Results sent automatically.</p>`
    : `
      <div style="text-align:center;">
        <a class="btn" id="email-btn" href="#">Email My Results</a>
      </div>
      <p class="footnote">Clicking "Email My Results" opens your email app with the results pre-filled, addressed to your training lead. Just hit send.</p>
    `;

  $("#app").innerHTML = `
    <div class="card">
      <div class="score-hero">
        <div class="score-num">${result.correctCount} / ${result.total}</div>
        <div class="score-sub">\u{1F389} Perfect score &middot; ${result.name}</div>
      </div>
      <table class="results">
        <tr><th>Guide</th><th>Score</th><th>%</th></tr>
        ${guideRows}
      </table>
      ${sendBlock}
      <div style="text-align:center;">
        <button class="btn secondary" id="retake-btn" style="margin-top:14px;">Retake Test</button>
      </div>
    </div>
  `;
  if(!autoSent){
    $("#email-btn").href = buildMailto(result);
  }
  $("#retake-btn").onclick = () => {
    answers = new Array(QUESTIONS.length).fill(null);
    current = 0;
    renderStart();
  };
}

document.addEventListener("DOMContentLoaded", () => {
  renderStart();
});
</script>
</body>
</html>
